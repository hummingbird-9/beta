<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>humming[bird]Tech</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, #0a2e0a, #1a5d1a, #0a2e0a, #1a5d1a);
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      text-align: center;
      justify-content: flex-start;
      padding-top: 40px;
      position: relative;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .title {
      color: #90E4C1;
      text-shadow: 0 0 15px rgba(0, 255, 157, 0.8), 0 0 30px rgba(0, 255, 157, 0.6), 0 0 45px rgba(0, 255, 157, 0.4);
      font-size: 2.5rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    button {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #e0f7e0;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      margin: 10px 8px;
      padding: 14px 40px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 8px 32px 0 rgba(0, 255, 45, 0.15);
      backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
      transition: transform 0.3s ease, background 0.3s ease;
      min-width: 180px;
      user-select: none;
    }

    button:hover,
    button:focus {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
      outline: none;
    }

    button:active {
      transform: scale(1);
    }
  </style>
  
</head>

<body>

  <h1>ONLY FOR USE OUTSIDE OF CLASS, DO NOT USE IN CLASS AND TEACHERS CAN SEE UR SCREEN FROM THEIR DEVICES WITH LINEWIZE!! THAT MEANS YOU YUSTIN!!</h1>
  <h1><img src="https://uploads.onecompiler.io/447kr4gf2/44f9wbztv/humming%5Bbird%5DTech%20logo%20(4).png" alt="Logo"></h1>

  <button id="gallery-btn" onclick="location.href='gallery.html'">Gallery of ports, flash games, and other HTMLs</button>
  <button onclick="location.href='hummingweb.html'">Search Engine</button>
  <button onclick="alert('Made by Oliver Boyd (hummingbird_9). humming[bird]Tech Version 1.8.3')">About</button>
  <button onclick="location.href='ww3.html'">WW3 Trailer</button>

  <script>
    function checkClassStatus() {
      fetch('https://onecompiler.com', { mode: 'no-cors' })
        .then(() => {
          console.log("Not in class. Gallery available.");
          document.getElementById('gallery-btn').style.display = 'inline-block';
        })
        .catch(() => {
          console.log("Active Class detected! Hiding Gallery.");
          document.getElementById('gallery-btn').style.display = 'none';
        });
    }
    checkClassStatus();
  </script>
</body>

</html>
